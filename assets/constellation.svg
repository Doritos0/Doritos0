<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="cn-title cn-desc">
  <title id="cn-title">Symbolic constellations of the craft</title>
  <desc id="cn-desc">A decorative gothic star chart showing four symbolic constellations — Crux, Cultellus, Calix and Clavis — drawn as connected star patterns on a night sky.</desc>
  <defs>
    <linearGradient id="cn-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0203"/>
      <stop offset="60%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#1A0408"/>
    </linearGradient>
    <radialGradient id="cn-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F4E4B8"/>
      <stop offset="60%" stop-color="#C9A86A"/>
      <stop offset="100%" stop-color="#5B1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cn-glow-red" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E7DCC8"/>
      <stop offset="50%" stop-color="#8E1B2A"/>
      <stop offset="100%" stop-color="#3B0A12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cn-halo" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#8E1B2A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <filter id="cn-blur"><feGaussianBlur stdDeviation="1.6"/></filter>
  </defs>

  <rect width="1200" height="320" fill="url(#cn-sky)"/>

  <!-- Diffuse star dust -->
  <g fill="#E7DCC8">
    <circle cx="60"   cy="40"  r="0.6" opacity="0.6"/>
    <circle cx="140"  cy="80"  r="0.5" opacity="0.5"/>
    <circle cx="220"  cy="30"  r="0.7" opacity="0.6"/>
    <circle cx="300"  cy="68"  r="0.5" opacity="0.4"/>
    <circle cx="380"  cy="44"  r="0.6" opacity="0.5"/>
    <circle cx="460"  cy="22"  r="0.5" opacity="0.5"/>
    <circle cx="540"  cy="78"  r="0.6" opacity="0.6"/>
    <circle cx="620"  cy="30"  r="0.5" opacity="0.5"/>
    <circle cx="700"  cy="64"  r="0.6" opacity="0.6"/>
    <circle cx="780"  cy="20"  r="0.7" opacity="0.7"/>
    <circle cx="860"  cy="72"  r="0.5" opacity="0.5"/>
    <circle cx="940"  cy="36"  r="0.6" opacity="0.6"/>
    <circle cx="1020" cy="60"  r="0.5" opacity="0.4"/>
    <circle cx="1100" cy="28"  r="0.6" opacity="0.6"/>
    <circle cx="1160" cy="58"  r="0.5" opacity="0.5"/>
    <circle cx="100"  cy="240" r="0.5" opacity="0.4"/>
    <circle cx="260"  cy="250" r="0.6" opacity="0.5"/>
    <circle cx="420"  cy="230" r="0.5" opacity="0.4"/>
    <circle cx="600"  cy="248" r="0.6" opacity="0.5"/>
    <circle cx="780"  cy="232" r="0.5" opacity="0.4"/>
    <circle cx="960"  cy="248" r="0.6" opacity="0.5"/>
    <circle cx="1120" cy="232" r="0.5" opacity="0.4"/>
  </g>

  <!-- Section halos -->
  <ellipse cx="180"  cy="150" rx="130" ry="90" fill="url(#cn-halo)"/>
  <ellipse cx="490"  cy="150" rx="130" ry="90" fill="url(#cn-halo)"/>
  <ellipse cx="790"  cy="150" rx="130" ry="90" fill="url(#cn-halo)"/>
  <ellipse cx="1060" cy="150" rx="130" ry="90" fill="url(#cn-halo)"/>

  <!-- Vertical dividers between constellations -->
  <g stroke="#3B0A12" stroke-width="0.6">
    <line x1="320"  y1="50" x2="320"  y2="250"/>
    <line x1="630"  y1="50" x2="630"  y2="250"/>
    <line x1="930"  y1="50" x2="930"  y2="250"/>
  </g>
  <g fill="#5B1117">
    <polygon points="320,50 314,56 326,56"/>
    <polygon points="320,250 314,244 326,244"/>
    <polygon points="630,50 624,56 636,56"/>
    <polygon points="630,250 624,244 636,244"/>
    <polygon points="930,50 924,56 936,56"/>
    <polygon points="930,250 924,244 936,244"/>
  </g>

  <!-- =================== CRUX =================== -->
  <!-- 5 stars forming a cross: center, top, bottom, left, right -->
  <g>
    <!-- connecting lines -->
    <g stroke="#C9A86A" stroke-width="0.6" opacity="0.55">
      <line x1="180" y1="100" x2="180" y2="200"/>
      <line x1="130" y1="150" x2="230" y2="150"/>
    </g>
    <!-- stars -->
    <g>
      <circle cx="180" cy="100" r="9"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="180" cy="100" r="2.2" fill="#F4E4B8"/>
      <circle cx="180" cy="200" r="9"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="180" cy="200" r="2.2" fill="#F4E4B8"/>
      <circle cx="130" cy="150" r="9"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="130" cy="150" r="2.2" fill="#F4E4B8"/>
      <circle cx="230" cy="150" r="9"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="230" cy="150" r="2.2" fill="#F4E4B8"/>
      <!-- center, brightest -->
      <circle cx="180" cy="150" r="14" fill="url(#cn-glow-red)" filter="url(#cn-blur)"/>
      <circle cx="180" cy="150" r="3.4" fill="#E7DCC8"/>
      <g stroke="#F4E4B8" stroke-width="0.6" opacity="0.85">
        <line x1="180" y1="138" x2="180" y2="162"/>
        <line x1="168" y1="150" x2="192" y2="150"/>
      </g>
    </g>
    <!-- label -->
    <text x="180" y="278" font-family="UnifrakturMaguntia, serif" font-size="20" fill="#C9A86A" text-anchor="middle">Crux</text>
    <text x="180" y="298" font-family="'IM Fell English', Georgia, serif" font-size="11" fill="#7E7478" text-anchor="middle" font-style="italic">la fe en el oficio</text>
  </g>

  <!-- =================== CULTELLUS (dagger) =================== -->
  <!-- pommel, grip, guard, blade-mid, blade-tip -->
  <g>
    <g stroke="#C9A86A" stroke-width="0.6" opacity="0.55">
      <line x1="475" y1="218" x2="475" y2="198"/>
      <line x1="475" y1="198" x2="475" y2="178"/>
      <line x1="445" y1="178" x2="505" y2="178"/>
      <line x1="475" y1="178" x2="475" y2="138"/>
      <line x1="475" y1="138" x2="475" y2="98"/>
    </g>
    <g>
      <circle cx="475" cy="218" r="9"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="475" cy="218" r="2.2" fill="#F4E4B8"/>
      <circle cx="475" cy="198" r="8"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="475" cy="198" r="2" fill="#F4E4B8"/>
      <circle cx="445" cy="178" r="9"  fill="url(#cn-glow-red)" filter="url(#cn-blur)"/>
      <circle cx="445" cy="178" r="2.4" fill="#E7DCC8"/>
      <circle cx="505" cy="178" r="9"  fill="url(#cn-glow-red)" filter="url(#cn-blur)"/>
      <circle cx="505" cy="178" r="2.4" fill="#E7DCC8"/>
      <circle cx="475" cy="138" r="9"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="475" cy="138" r="2.2" fill="#F4E4B8"/>
      <!-- tip, brightest -->
      <circle cx="475" cy="98" r="14" fill="url(#cn-glow-red)" filter="url(#cn-blur)"/>
      <circle cx="475" cy="98" r="3.4" fill="#E7DCC8"/>
      <g stroke="#F4E4B8" stroke-width="0.6" opacity="0.85">
        <line x1="475" y1="86" x2="475" y2="110"/>
        <line x1="463" y1="98" x2="487" y2="98"/>
      </g>
    </g>
    <text x="475" y="278" font-family="UnifrakturMaguntia, serif" font-size="20" fill="#C9A86A" text-anchor="middle">Cultellus</text>
    <text x="475" y="298" font-family="'IM Fell English', Georgia, serif" font-size="11" fill="#7E7478" text-anchor="middle" font-style="italic">precision del codigo</text>
  </g>

  <!-- =================== CALIX (chalice) =================== -->
  <!-- rim left, rim right, bowl bottom, stem, base -->
  <g>
    <g stroke="#C9A86A" stroke-width="0.6" opacity="0.55">
      <line x1="745" y1="110" x2="835" y2="110"/>
      <line x1="745" y1="110" x2="790" y2="160"/>
      <line x1="835" y1="110" x2="790" y2="160"/>
      <line x1="790" y1="160" x2="790" y2="200"/>
      <line x1="755" y1="220" x2="825" y2="220"/>
      <line x1="790" y1="200" x2="755" y2="220"/>
      <line x1="790" y1="200" x2="825" y2="220"/>
    </g>
    <g>
      <circle cx="745" cy="110" r="9"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="745" cy="110" r="2.2" fill="#F4E4B8"/>
      <circle cx="835" cy="110" r="9"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="835" cy="110" r="2.2" fill="#F4E4B8"/>
      <!-- center bowl bottom, brightest -->
      <circle cx="790" cy="160" r="14" fill="url(#cn-glow-red)" filter="url(#cn-blur)"/>
      <circle cx="790" cy="160" r="3.4" fill="#E7DCC8"/>
      <g stroke="#F4E4B8" stroke-width="0.6" opacity="0.85">
        <line x1="790" y1="148" x2="790" y2="172"/>
        <line x1="778" y1="160" x2="802" y2="160"/>
      </g>
      <circle cx="790" cy="200" r="8"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="790" cy="200" r="2" fill="#F4E4B8"/>
      <circle cx="755" cy="220" r="9"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="755" cy="220" r="2.2" fill="#F4E4B8"/>
      <circle cx="825" cy="220" r="9"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="825" cy="220" r="2.2" fill="#F4E4B8"/>
    </g>
    <text x="790" y="278" font-family="UnifrakturMaguntia, serif" font-size="20" fill="#C9A86A" text-anchor="middle">Calix</text>
    <text x="790" y="298" font-family="'IM Fell English', Georgia, serif" font-size="11" fill="#7E7478" text-anchor="middle" font-style="italic">memoria de los datos</text>
  </g>

  <!-- =================== CLAVIS (key) =================== -->
  <!-- ring top, ring left, ring right, shaft, bit -->
  <g>
    <g stroke="#C9A86A" stroke-width="0.6" opacity="0.55">
      <line x1="1060" y1="100" x2="1030" y2="130"/>
      <line x1="1060" y1="100" x2="1090" y2="130"/>
      <line x1="1030" y1="130" x2="1060" y2="160"/>
      <line x1="1090" y1="130" x2="1060" y2="160"/>
      <line x1="1060" y1="160" x2="1060" y2="220"/>
      <line x1="1060" y1="220" x2="1090" y2="220"/>
    </g>
    <g>
      <!-- ring top, brightest -->
      <circle cx="1060" cy="100" r="14" fill="url(#cn-glow-red)" filter="url(#cn-blur)"/>
      <circle cx="1060" cy="100" r="3.4" fill="#E7DCC8"/>
      <g stroke="#F4E4B8" stroke-width="0.6" opacity="0.85">
        <line x1="1060" y1="88" x2="1060" y2="112"/>
        <line x1="1048" y1="100" x2="1072" y2="100"/>
      </g>
      <circle cx="1030" cy="130" r="9"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="1030" cy="130" r="2.2" fill="#F4E4B8"/>
      <circle cx="1090" cy="130" r="9"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="1090" cy="130" r="2.2" fill="#F4E4B8"/>
      <circle cx="1060" cy="160" r="9"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="1060" cy="160" r="2.2" fill="#F4E4B8"/>
      <circle cx="1060" cy="220" r="9"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="1060" cy="220" r="2.2" fill="#F4E4B8"/>
      <circle cx="1090" cy="220" r="8"  fill="url(#cn-glow)" filter="url(#cn-blur)"/>
      <circle cx="1090" cy="220" r="2" fill="#F4E4B8"/>
    </g>
    <text x="1060" y="278" font-family="UnifrakturMaguntia, serif" font-size="20" fill="#C9A86A" text-anchor="middle">Clavis</text>
    <text x="1060" y="298" font-family="'IM Fell English', Georgia, serif" font-size="11" fill="#7E7478" text-anchor="middle" font-style="italic">acceso a lo cerrado</text>
  </g>

  <!-- Title strip -->
  <g transform="translate(600,32)">
    <line x1="-260" y1="0" x2="-110" y2="0" stroke="#5B1117" stroke-width="0.7"/>
    <line x1="110" y1="0" x2="260" y2="0" stroke="#5B1117" stroke-width="0.7"/>
    <polygon points="-110,0 -100,-6 -90,0 -100,6" fill="#3B0A12"/>
    <polygon points="90,0 100,-6 110,0 100,6" fill="#3B0A12"/>
    <text y="4" font-family="UnifrakturMaguntia, serif" font-size="16" fill="#E7DCC8" text-anchor="middle" letter-spacing="4">Constelaciones del Oficio</text>
  </g>

  <!-- Footer caption -->
  <text x="600" y="316" font-family="'IM Fell English', Georgia, serif" font-size="11" fill="#7E7478" text-anchor="middle" font-style="italic">— cuatro figuras simbolicas trazadas en el cielo, no datos: solo emblemas —</text>
</svg>
