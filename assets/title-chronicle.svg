  <rect width="1200" height="130" fill="url(#t3-bg)"/>

  <path d="M 120 110 L 120 56 Q 600 -50 1080 56 L 1080 110 L 1080 116 L 120 116 Z" fill="none" stroke="#8B6BB5" stroke-width="0.7" opacity="0.65"/>
  <path d="M 130 110 L 130 60 Q 600 -36 1070 60 L 1070 110" fill="none" stroke="#5d3a8a" stroke-width="0.5" opacity="0.5"/>

  <path d="M 592 6 L 608 6 L 612 20 L 588 20 Z" fill="#3d2050" stroke="#A78BCA" stroke-width="0.6"/>
  <line x1="600" y1="9" x2="600" y2="18" stroke="#C9A8D6" stroke-width="0.7"/>
  <line x1="596" y1="12" x2="604" y2="12" stroke="#C9A8D6" stroke-width="0.7"/>

  <line x1="40" y1="75" x2="380" y2="75" stroke="url(#t3-line)" stroke-width="0.9"/>
  <line x1="820" y1="75" x2="1160" y2="75" stroke="url(#t3-line)" stroke-width="0.9"/>

  <g fill="#A78BCA">
