<svg width="1000" height="480" viewBox="0 0 1000 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ar-title ar-desc">
  <title id="ar-title">Three arcane cards of the stack</title>
  <desc id="ar-desc">Three vertical gothic tarot-style cards representing the Interface, the Engine and the Vault — frontend, backend and data layers.</desc>
  <defs>
    <linearGradient id="ac-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080103"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="ac-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0E12"/>
      <stop offset="50%" stop-color="#0A0507"/>
      <stop offset="100%" stop-color="#1A0E12"/>
    </linearGradient>
    <linearGradient id="ac-gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7A5A2E"/>
      <stop offset="50%" stop-color="#C9A86A"/>
      <stop offset="100%" stop-color="#7A5A2E"/>
    </linearGradient>
    <radialGradient id="ac-spot" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#8E1B2A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <filter id="ac-glow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="1000" height="480" fill="url(#ac-bg)"/>

  <!-- Ambient candle halos -->
  <circle cx="180" cy="240" r="180" fill="url(#ac-spot)"/>
  <circle cx="500" cy="240" r="180" fill="url(#ac-spot)"/>
  <circle cx="820" cy="240" r="180" fill="url(#ac-spot)"/>

  <!-- =================== CARD I — INTERFACE =================== -->
  <g transform="translate(60,40)">
    <rect width="240" height="400" rx="6" fill="url(#ac-card)" stroke="#3B0A12" stroke-width="2"/>
    <rect x="8" y="8" width="224" height="384" rx="4" fill="none" stroke="url(#ac-gold)" stroke-width="1"/>
    <rect x="16" y="16" width="208" height="368" rx="2" fill="none" stroke="#5B1117" stroke-width="0.6"/>

    <!-- Roman numeral -->
    <text x="120" y="50" font-family="UnifrakturMaguntia, serif" font-size="20" fill="#C9A86A" text-anchor="middle" letter-spacing="6">— I —</text>

    <!-- Central sigil: interlaced angle brackets in a circle -->
    <g transform="translate(120,180)">
      <circle r="72" fill="none" stroke="#5B1117" stroke-width="1.6"/>
      <circle r="60" fill="none" stroke="#3B0A12" stroke-width="0.8"/>
      <circle r="6" fill="#C9A86A"/>
      <g stroke="#E7DCC8" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="-30,-22 -50,0 -30,22"/>
        <polyline points="30,-22 50,0 30,22"/>
        <line x1="-15" y1="30" x2="15" y2="-30" stroke="#8E1B2A"/>
      </g>
      <!-- Orbit ticks -->
      <g stroke="#C9A86A" stroke-width="1.2">
        <line x1="0" y1="-72" x2="0" y2="-62"/>
        <line x1="0" y1="62" x2="0" y2="72"/>
        <line x1="-72" y1="0" x2="-62" y2="0"/>
        <line x1="62" y1="0" x2="72" y2="0"/>
      </g>
    </g>

    <!-- Title -->
    <text x="120" y="290" font-family="UnifrakturMaguntia, serif" font-size="28" fill="#E7DCC8" text-anchor="middle">La Interfaz</text>
    <line x1="50" y1="304" x2="190" y2="304" stroke="#5B1117" stroke-width="0.7"/>

    <!-- Body lines -->
    <g font-family="'IM Fell English', Georgia, serif" font-size="13" fill="#B5A99A" text-anchor="middle">
      <text x="120" y="330">React</text>
      <text x="120" y="350">Angular</text>
      <text x="120" y="370">TypeScript · HTML · CSS</text>
    </g>
  </g>

  <!-- =================== CARD II — ENGINE =================== -->
  <g transform="translate(380,40)">
    <rect width="240" height="400" rx="6" fill="url(#ac-card)" stroke="#3B0A12" stroke-width="2"/>
    <rect x="8" y="8" width="224" height="384" rx="4" fill="none" stroke="url(#ac-gold)" stroke-width="1"/>
    <rect x="16" y="16" width="208" height="368" rx="2" fill="none" stroke="#5B1117" stroke-width="0.6"/>

    <text x="120" y="50" font-family="UnifrakturMaguntia, serif" font-size="20" fill="#C9A86A" text-anchor="middle" letter-spacing="6">— II —</text>

    <!-- Sigil: gothic dagger crossed with a key (the engine of the system) -->
    <g transform="translate(120,180)">
      <circle r="72" fill="none" stroke="#5B1117" stroke-width="1.6"/>
      <circle r="60" fill="none" stroke="#3B0A12" stroke-width="0.8"/>

      <!-- Dagger -->
      <g transform="rotate(-30)">
        <rect x="-2" y="-60" width="4" height="80" fill="#E7DCC8"/>
        <polygon points="0,-70 -3,-60 3,-60" fill="#E7DCC8"/>
        <rect x="-14" y="20" width="28" height="4" fill="#C9A86A"/>
        <rect x="-2" y="24" width="4" height="16" fill="#8E1B2A"/>
        <circle cy="42" r="4" fill="#C9A86A"/>
      </g>

      <!-- Key -->
      <g transform="rotate(30)">
        <circle cx="0" cy="-38" r="12" fill="none" stroke="#C9A86A" stroke-width="3"/>
        <circle cx="0" cy="-38" r="4" fill="#050505"/>
        <rect x="-1.6" y="-26" width="3.2" height="60" fill="#C9A86A"/>
        <rect x="1.6" y="20" width="8" height="3" fill="#C9A86A"/>
        <rect x="1.6" y="28" width="6" height="3" fill="#C9A86A"/>
      </g>

      <circle r="6" fill="#8E1B2A"/>
      <g stroke="#C9A86A" stroke-width="1.2">
        <line x1="0" y1="-72" x2="0" y2="-62"/>
        <line x1="0" y1="62" x2="0" y2="72"/>
        <line x1="-72" y1="0" x2="-62" y2="0"/>
        <line x1="62" y1="0" x2="72" y2="0"/>
      </g>
    </g>

    <text x="120" y="290" font-family="UnifrakturMaguntia, serif" font-size="28" fill="#E7DCC8" text-anchor="middle">El Motor</text>
    <line x1="50" y1="304" x2="190" y2="304" stroke="#5B1117" stroke-width="0.7"/>

    <g font-family="'IM Fell English', Georgia, serif" font-size="13" fill="#B5A99A" text-anchor="middle">
      <text x="120" y="330">Python</text>
      <text x="120" y="350">Django · FastAPI</text>
      <text x="120" y="370">REST · automatizacion</text>
    </g>
  </g>

  <!-- =================== CARD III — VAULT =================== -->
  <g transform="translate(700,40)">
    <rect width="240" height="400" rx="6" fill="url(#ac-card)" stroke="#3B0A12" stroke-width="2"/>
    <rect x="8" y="8" width="224" height="384" rx="4" fill="none" stroke="url(#ac-gold)" stroke-width="1"/>
    <rect x="16" y="16" width="208" height="368" rx="2" fill="none" stroke="#5B1117" stroke-width="0.6"/>

    <text x="120" y="50" font-family="UnifrakturMaguntia, serif" font-size="20" fill="#C9A86A" text-anchor="middle" letter-spacing="6">— III —</text>

    <!-- Sigil: chalice / cylindrical vault (data) -->
    <g transform="translate(120,180)">
      <circle r="72" fill="none" stroke="#5B1117" stroke-width="1.6"/>
      <circle r="60" fill="none" stroke="#3B0A12" stroke-width="0.8"/>

      <!-- Stacked discs (database) -->
      <g transform="translate(0,4)" stroke="#C9A86A" stroke-width="1.4" fill="#1A0408">
        <ellipse cy="-22" rx="34" ry="9"/>
        <path d="M -34 -22 L -34 -2 Q -34 7 0 7 Q 34 7 34 -2 L 34 -22"/>
        <ellipse cy="-2" rx="34" ry="9" fill="none"/>
        <path d="M -34 -2 L -34 18 Q -34 27 0 27 Q 34 27 34 18 L 34 -2" fill="#1A0408"/>
        <ellipse cy="18" rx="34" ry="9" fill="none"/>
        <path d="M -34 18 L -34 36 Q -34 45 0 45 Q 34 45 34 36 L 34 18" fill="#1A0408"/>
      </g>
      <!-- Reflection -->
      <ellipse cy="-26" rx="20" ry="3" fill="#E7DCC8" opacity="0.35"/>

      <g stroke="#C9A86A" stroke-width="1.2">
        <line x1="0" y1="-72" x2="0" y2="-62"/>
        <line x1="0" y1="62" x2="0" y2="72"/>
        <line x1="-72" y1="0" x2="-62" y2="0"/>
        <line x1="62" y1="0" x2="72" y2="0"/>
      </g>
    </g>

    <text x="120" y="290" font-family="UnifrakturMaguntia, serif" font-size="28" fill="#E7DCC8" text-anchor="middle">La Boveda</text>
    <line x1="50" y1="304" x2="190" y2="304" stroke="#5B1117" stroke-width="0.7"/>

    <g font-family="'IM Fell English', Georgia, serif" font-size="13" fill="#B5A99A" text-anchor="middle">
      <text x="120" y="330">PostgreSQL · MySQL</text>
      <text x="120" y="350">SQL · modelado</text>
      <text x="120" y="370">integridad &amp; escala</text>
    </g>
  </g>

  <!-- Bottom subtle gilded baseline -->
  <line x1="60" y1="455" x2="940" y2="455" stroke="#5B1117" stroke-width="0.6"/>
  <text x="500" y="472" font-family="'IM Fell English', Georgia, serif" font-size="11" fill="#7E7478" text-anchor="middle" font-style="italic">— tres caras de un mismo oficio —</text>
</svg>
