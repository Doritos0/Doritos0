<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="60" viewBox="0 0 1200 60" role="img" aria-label="divider">
  <defs>
    <linearGradient id="dv-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="50%" stop-color="#3d2050"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="dv-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6BB5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D8C5F0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#8B6BB5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Top + bottom thin lines -->
  <line x1="0" y1="20" x2="1200" y2="20" stroke="url(#dv-line)" stroke-width="0.6" opacity="0.6"/>
  <line x1="0" y1="40" x2="1200" y2="40" stroke="url(#dv-line)" stroke-width="0.6" opacity="0.6"/>

  <!-- Central hazard bar -->
  <rect x="0" y="24" width="1200" height="12" fill="url(#dv-bar)"/>
  <!-- Hazard stripes -->
  <g fill="#06030d">
    <rect x="0" y="24" width="40" height="12"/>
    <rect x="60" y="24" width="20" height="12"/>
    <rect x="100" y="24" width="20" height="12"/>
    <rect x="140" y="24" width="20" height="12"/>
    <rect x="180" y="24" width="20" height="12"/>
    <rect x="220" y="24" width="20" height="12"/>
    <rect x="980" y="24" width="20" height="12"/>
    <rect x="1020" y="24" width="20" height="12"/>
    <rect x="1060" y="24" width="20" height="12"/>
    <rect x="1100" y="24" width="20" height="12"/>
    <rect x="1140" y="24" width="20" height="12"/>
    <rect x="1160" y="24" width="40" height="12"/>
  </g>

  <!-- Central plate -->
  <rect x="540" y="14" width="120" height="32" fill="#06030d" stroke="#8B6BB5" stroke-width="0.8"/>
  <!-- Bolts -->
  <g fill="#1a0a2e" stroke="#8B6BB5" stroke-width="0.5">
    <circle cx="548" cy="22" r="2"/>
    <circle cx="652" cy="22" r="2"/>
    <circle cx="548" cy="38" r="2"/>
    <circle cx="652" cy="38" r="2"/>
  </g>
  <text x="600" y="34" text-anchor="middle"
        font-family="Consolas, 'Courier New', monospace"
        font-size="10" letter-spacing="5" fill="#D8C5F0">
    [ &#x25A0; / 0080 / &#x25A0; ]
  </text>
</svg>
