<svg width="1000" height="360" viewBox="0 0 1000 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Doritos0 developer profile</title>
  <desc id="desc">A gothic framed developer profile with three pointed panels for frontend, backend, and workflow.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111013"/>
      <stop offset="58%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#1E0D12"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B0A12"/>
      <stop offset="50%" stop-color="#8E1B2A"/>
      <stop offset="100%" stop-color="#3B0A12"/>
    </linearGradient>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="360" fill="#050505"/>
  <rect x="20" y="20" width="960" height="320" fill="none" stroke="#2A2023" stroke-width="2"/>
  <rect x="34" y="34" width="932" height="292" fill="none" stroke="#3B0A12" stroke-width="1"/>
  <path d="M90 304H910" stroke="url(#line)" stroke-width="2"/>
  <path d="M130 58C245 34 355 34 500 58C645 34 755 34 870 58" stroke="#3B0A12" stroke-width="2"/>

  <text x="500" y="78" text-anchor="middle" fill="#E7DCC8" font-family="'Old English Text MT', 'UnifrakturMaguntia', Georgia, serif" font-size="42" letter-spacing="2">
    El Libro Negro
  </text>
  <text x="500" y="108" text-anchor="middle" fill="#B5A99A" font-family="Georgia, 'Times New Roman', serif" font-size="16">
    Desarrollo web full stack con foco en interfaces claras, APIs mantenibles y soluciones utiles.
  </text>

  <g transform="translate(76 128)">
    <path d="M0 190V70C0 33 82 0 130 0C178 0 260 33 260 70V190H0Z" fill="url(#panel)" stroke="#5B1117" stroke-width="2"/>
    <path d="M24 190V78C24 51 92 24 130 24C168 24 236 51 236 78V190" stroke="#2A2023" stroke-width="1"/>
    <path d="M130 0V190" stroke="#33282C" stroke-width="1" opacity="0.65"/>
    <circle cx="130" cy="24" r="4" fill="#8E1B2A" filter="url(#glow)"/>
    <text x="130" y="70" text-anchor="middle" fill="#E7DCC8" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Frontend</text>
    <text x="130" y="104" text-anchor="middle" fill="#B5A99A" font-family="Consolas, 'Courier New', monospace" font-size="16">React</text>
    <text x="130" y="132" text-anchor="middle" fill="#B5A99A" font-family="Consolas, 'Courier New', monospace" font-size="16">Angular</text>
    <text x="130" y="160" text-anchor="middle" fill="#B5A99A" font-family="Consolas, 'Courier New', monospace" font-size="16">TypeScript</text>
    <text x="130" y="188" text-anchor="middle" fill="#8F8588" font-family="Consolas, 'Courier New', monospace" font-size="15">JavaScript . HTML . CSS</text>
  </g>

  <g transform="translate(370 128)">
    <path d="M0 190V70C0 33 82 0 130 0C178 0 260 33 260 70V190H0Z" fill="url(#panel)" stroke="#5B1117" stroke-width="2"/>
    <path d="M24 190V78C24 51 92 24 130 24C168 24 236 51 236 78V190" stroke="#2A2023" stroke-width="1"/>
    <path d="M130 0V190" stroke="#33282C" stroke-width="1" opacity="0.65"/>
    <circle cx="130" cy="24" r="4" fill="#8E1B2A" filter="url(#glow)"/>
    <text x="130" y="70" text-anchor="middle" fill="#E7DCC8" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Backend</text>
    <text x="130" y="104" text-anchor="middle" fill="#B5A99A" font-family="Consolas, 'Courier New', monospace" font-size="16">Python</text>
    <text x="130" y="132" text-anchor="middle" fill="#B5A99A" font-family="Consolas, 'Courier New', monospace" font-size="16">Django</text>
    <text x="130" y="160" text-anchor="middle" fill="#B5A99A" font-family="Consolas, 'Courier New', monospace" font-size="16">FastAPI</text>
    <text x="130" y="188" text-anchor="middle" fill="#8F8588" font-family="Consolas, 'Courier New', monospace" font-size="15">PostgreSQL . MySQL</text>
  </g>

  <g transform="translate(664 128)">
    <path d="M0 190V70C0 33 82 0 130 0C178 0 260 33 260 70V190H0Z" fill="url(#panel)" stroke="#5B1117" stroke-width="2"/>
    <path d="M24 190V78C24 51 92 24 130 24C168 24 236 51 236 78V190" stroke="#2A2023" stroke-width="1"/>
    <path d="M130 0V190" stroke="#33282C" stroke-width="1" opacity="0.65"/>
    <circle cx="130" cy="24" r="4" fill="#8E1B2A" filter="url(#glow)"/>
    <text x="130" y="70" text-anchor="middle" fill="#E7DCC8" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Herramientas</text>
    <text x="130" y="104" text-anchor="middle" fill="#B5A99A" font-family="Consolas, 'Courier New', monospace" font-size="16">Git</text>
    <text x="130" y="132" text-anchor="middle" fill="#B5A99A" font-family="Consolas, 'Courier New', monospace" font-size="16">GitHub</text>
    <text x="130" y="160" text-anchor="middle" fill="#B5A99A" font-family="Consolas, 'Courier New', monospace" font-size="16">VS Code</text>
    <text x="130" y="188" text-anchor="middle" fill="#8F8588" font-family="Consolas, 'Courier New', monospace" font-size="15">Postman . Docker</text>
  </g>
</svg>
