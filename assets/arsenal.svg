<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="ar-title">
  <title id="ar-title">Arsenal - tres modulos brutalistas</title>
  <defs>
    <linearGradient id="ar-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06030d"/>
      <stop offset="100%" stop-color="#150a26"/>
    </linearGradient>
    <linearGradient id="ar-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="50%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#06030d"/>
    </linearGradient>
    <linearGradient id="ar-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a2a6e"/>
      <stop offset="100%" stop-color="#2d1b4e"/>
    </linearGradient>
    <linearGradient id="ar-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#06030d"/>
    </linearGradient>
    <linearGradient id="ar-title-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4e7ff"/>
      <stop offset="100%" stop-color="#A78BCA"/>
    </linearGradient>
    <pattern id="ar-grid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1a0a2e" stroke-width="0.4"/>
    </pattern>
    <filter id="ar-glow"><feGaussianBlur stdDeviation="1.4"/></filter>
    <filter id="ar-led-glow"><feGaussianBlur stdDeviation="1.6"/></filter>
  </defs>

  <rect width="1200" height="620" fill="url(#ar-bg)"/>
  <rect width="1200" height="620" fill="url(#ar-grid)" opacity="0.6"/>

  <!-- Top index bar -->
  <rect x="0" y="0" width="1200" height="28" fill="#04020a"/>
  <line x1="0" y1="28" x2="1200" y2="28" stroke="#3d2050" stroke-width="0.5"/>
  <text x="20" y="18" font-family="Consolas, 'Courier New', monospace" font-size="10" letter-spacing="3" fill="#8B6BB5">SYS // ARSENAL.MAP &#x00B7; ZONE/V &#x00B7; 03 MODULES ONLINE</text>
  <text x="1180" y="18" text-anchor="end" font-family="Consolas, monospace" font-size="10" letter-spacing="3" fill="#8B6BB5">[ &#x25CF; &#x25CF; &#x25CF; ] OK</text>

  <!-- Bottom index bar -->
  <rect x="0" y="592" width="1200" height="28" fill="#04020a"/>
  <line x1="0" y1="592" x2="1200" y2="592" stroke="#3d2050" stroke-width="0.5"/>
  <text x="600" y="610" text-anchor="middle" font-family="Consolas, monospace" font-size="10" letter-spacing="6" fill="#8B6BB5">// END MODULE ARRAY // DORITOS0 / OPERATOR //</text>

  <!-- ============ MODULE 1: INTERFAZ - x 40 to 400 ============ -->
  <g>
    <!-- Bracket marks -->
    <g stroke="#5d3a8a" stroke-width="0.8" fill="none">
      <path d="M 40 70 L 60 70 M 40 70 L 40 86"/>
      <path d="M 400 70 L 380 70 M 400 70 L 400 86"/>
      <path d="M 40 558 L 60 558 M 40 558 L 40 542"/>
      <path d="M 400 558 L 380 558 M 400 558 L 400 542"/>
    </g>

    <!-- Body -->
    <rect x="48" y="78" width="344" height="472" fill="url(#ar-panel)" stroke="#8B6BB5" stroke-width="1"/>
    <rect x="56" y="86" width="328" height="456" fill="none" stroke="#5d3a8a" stroke-width="0.4" opacity="0.7"/>

    <!-- Corner bolts -->
    <g fill="#06030d" stroke="#8B6BB5" stroke-width="0.6">
      <circle cx="62" cy="92" r="3.5"/><circle cx="378" cy="92" r="3.5"/>
      <circle cx="62" cy="536" r="3.5"/><circle cx="378" cy="536" r="3.5"/>
    </g>
    <g stroke="#8B6BB5" stroke-width="0.5">
      <line x1="59" y1="92" x2="65" y2="92"/><line x1="62" y1="89" x2="62" y2="95"/>
      <line x1="375" y1="92" x2="381" y2="92" /><line x1="378" y1="89" x2="378" y2="95"/>
      <line x1="59" y1="536" x2="65" y2="536"/><line x1="62" y1="533" x2="62" y2="539"/>
      <line x1="375" y1="536" x2="381" y2="536"/><line x1="378" y1="533" x2="378" y2="539"/>
