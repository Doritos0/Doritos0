    <g stroke="#2d1b4e" stroke-width="0.4" opacity="0.5">
      <line x1="832" y1="220" x2="1128" y2="220"/><line x1="832" y1="234" x2="1128" y2="234"/><line x1="832" y1="248" x2="1128" y2="248"/><line x1="832" y1="262" x2="1128" y2="262"/><line x1="832" y1="276" x2="1128" y2="276"/><line x1="832" y1="290" x2="1128" y2="290"/><line x1="832" y1="304" x2="1128" y2="304"/><line x1="832" y1="318" x2="1128" y2="318"/><line x1="832" y1="332" x2="1128" y2="332"/><line x1="832" y1="346" x2="1128" y2="346"/><line x1="832" y1="360" x2="1128" y2="360"/><line x1="832" y1="374" x2="1128" y2="374"/><line x1="832" y1="388" x2="1128" y2="388"/><line x1="832" y1="402" x2="1128" y2="402"/><line x1="832" y1="416" x2="1128" y2="416"/><line x1="832" y1="430" x2="1128" y2="430"/>
