      <text x="852" y="262"><tspan fill="#8B6BB5">&gt;</tspan> <tspan fill="#A78BCA">mount</tspan> MYSQL____8.x</text>
      <text x="852" y="292"><tspan fill="#8B6BB5">&gt;</tspan> <tspan fill="#A78BCA">mount</tspan> GIT______OK</text>
