    <rect x="72" y="104" width="14" height="26" fill="#06030d"/>
    <rect x="354" y="104" width="14" height="26" fill="#06030d"/>
    <text x="220" y="121" text-anchor="middle" font-family="Consolas, monospace" font-size="11" letter-spacing="6" fill="#D8C5F0">&#x25B6; MOD.01 &#x00B7; FRONT END &#x25C0;</text>

