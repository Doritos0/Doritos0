    <rect x="436" y="86" width="328" height="456" fill="none" stroke="#5d3a8a" stroke-width="0.4" opacity="0.7"/>

    <g fill="#06030d" stroke="#8B6BB5" stroke-width="0.6">
      <circle cx="442" cy="92" r="3.5"/><circle cx="758" cy="92" r="3.5"/>
      <circle cx="442" cy="536" r="3.5"/><circle cx="758" cy="536" r="3.5"/>
