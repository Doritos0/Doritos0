      <circle cx="140" cy="488" r="3.5" fill="#C9A8D6"/>
      <circle cx="160" cy="488" r="3.5" fill="#C9A8D6"/>
      <circle cx="180" cy="488" r="3.5" fill="#8B6BB5" opacity="0.7"/>
      <circle cx="200" cy="488" r="3.5" fill="#3d2050"/>
    </g>
    <text x="356" y="497" text-anchor="end" font-family="Consolas, monospace" font-size="9" letter-spacing="2" fill="#A78BCA">ONLINE / 080%</text>

    <!-- Bottom strap with motto -->
    <text x="220" y="528" text-anchor="middle" font-family="Consolas, monospace" font-size="9" letter-spacing="6" fill="#5d3a8a">VITRUM &#x00B7; LUX &#x00B7; OCULUS</text>
