    <rect x="452" y="208" width="296" height="240" fill="url(#ar-screen)" stroke="#5d3a8a" stroke-width="0.6"/>
    <g stroke="#2d1b4e" stroke-width="0.4" opacity="0.5">
      <line x1="452" y1="220" x2="748" y2="220"/><line x1="452" y1="234" x2="748" y2="234"/><line x1="452" y1="248" x2="748" y2="248"/><line x1="452" y1="262" x2="748" y2="262"/><line x1="452" y1="276" x2="748" y2="276"/><line x1="452" y1="290" x2="748" y2="290"/><line x1="452" y1="304" x2="748" y2="304"/><line x1="452" y1="318" x2="748" y2="318"/><line x1="452" y1="332" x2="748" y2="332"/><line x1="452" y1="346" x2="748" y2="346"/><line x1="452" y1="360" x2="748" y2="360"/><line x1="452" y1="374" x2="748" y2="374"/><line x1="452" y1="388" x2="748" y2="388"/><line x1="452" y1="402" x2="748" y2="402"/><line x1="452" y1="416" x2="748" y2="416"/><line x1="452" y1="430" x2="748" y2="430"/>
    </g>

    <g font-family="Consolas, monospace" font-size="14" fill="#D8C5F0">
      <text x="472" y="232"><tspan fill="#8B6BB5">&gt;</tspan> <tspan fill="#A78BCA">exec</tspan> PYTHON_____3.12</text>
      <text x="472" y="262"><tspan fill="#8B6BB5">&gt;</tspan> <tspan fill="#A78BCA">exec</tspan> DJANGO_____5.x</text>
      <text x="472" y="292"><tspan fill="#8B6BB5">&gt;</tspan> <tspan fill="#A78BCA">exec</tspan> FASTAPI____&#x25A0;&#x25A0;&#x25A0;</text>
      <text x="472" y="322"><tspan fill="#8B6BB5">&gt;</tspan> <tspan fill="#A78BCA">exec</tspan> REST_APIs__OK</text>
      <text x="472" y="352" fill="#6b4ba0">_ idle.</text>
