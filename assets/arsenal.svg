    <rect x="734" y="104" width="14" height="26" fill="#06030d"/>
    <text x="600" y="121" text-anchor="middle" font-family="Consolas, monospace" font-size="11" letter-spacing="6" fill="#D8C5F0">&#x25B6; MOD.02 &#x00B7; BACK END &#x25C0;</text>

    <text x="600" y="172" text-anchor="middle"
          font-family="Impact, 'Arial Black', Haettenschweiler, sans-serif"
          font-size="34" font-weight="900" letter-spacing="6"
