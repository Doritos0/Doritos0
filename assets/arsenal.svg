    <rect x="832" y="464" width="296" height="40" fill="#0a0510" stroke="#3d2050" stroke-width="0.5"/>
    <text x="844" y="480" font-family="Consolas, monospace" font-size="9" letter-spacing="3" fill="#6b4ba0">STATUS</text>
    <g filter="url(#ar-led-glow)">
