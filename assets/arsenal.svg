      <circle cx="900" cy="488" r="3.5" fill="#C9A8D6"/>
      <circle cx="920" cy="488" r="3.5" fill="#C9A8D6"/>
      <circle cx="940" cy="488" r="3.5" fill="#C9A8D6"/>
