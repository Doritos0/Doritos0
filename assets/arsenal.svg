    <!-- CRT screen with tech list -->
    <rect x="72" y="208" width="296" height="240" fill="url(#ar-screen)" stroke="#5d3a8a" stroke-width="0.6"/>
    <!-- Scanlines -->
    <g stroke="#2d1b4e" stroke-width="0.4" opacity="0.5">
      <line x1="72" y1="220" x2="368" y2="220"/>
      <line x1="72" y1="234" x2="368" y2="234"/>
      <line x1="72" y1="248" x2="368" y2="248"/>
      <line x1="72" y1="262" x2="368" y2="262"/>
      <line x1="72" y1="276" x2="368" y2="276"/>
      <line x1="72" y1="290" x2="368" y2="290"/>
      <line x1="72" y1="304" x2="368" y2="304"/>
      <line x1="72" y1="318" x2="368" y2="318"/>
      <line x1="72" y1="332" x2="368" y2="332"/>
      <line x1="72" y1="346" x2="368" y2="346"/>
      <line x1="72" y1="360" x2="368" y2="360"/>
      <line x1="72" y1="374" x2="368" y2="374"/>
      <line x1="72" y1="388" x2="368" y2="388"/>
      <line x1="72" y1="402" x2="368" y2="402"/>
      <line x1="72" y1="416" x2="368" y2="416"/>
      <line x1="72" y1="430" x2="368" y2="430"/>
    </g>

    <!-- Tech list (monospace, terminal style) -->
    <g font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#D8C5F0">
      <text x="92" y="232"><tspan fill="#8B6BB5">&gt;</tspan> <tspan fill="#A78BCA">load</tspan> REACT_______18.x</text>
      <text x="92" y="262"><tspan fill="#8B6BB5">&gt;</tspan> <tspan fill="#A78BCA">load</tspan> ANGULAR_____17.x</text>
      <text x="92" y="292"><tspan fill="#8B6BB5">&gt;</tspan> <tspan fill="#A78BCA">load</tspan> TYPESCRIPT__5.x</text>
      <text x="92" y="322"><tspan fill="#8B6BB5">&gt;</tspan> <tspan fill="#A78BCA">load</tspan> JAVASCRIPT__ES</text>
      <text x="92" y="352"><tspan fill="#8B6BB5">&gt;</tspan> <tspan fill="#A78BCA">load</tspan> HTML5__&#x25A0;&#x25A0;&#x25A0;&#x25A0;&#x25A0;</text>
      <text x="92" y="382"><tspan fill="#8B6BB5">&gt;</tspan> <tspan fill="#A78BCA">load</tspan> CSS3___&#x25A0;&#x25A0;&#x25A0;&#x25A0;&#x25A0;</text>
      <text x="92" y="412"><tspan fill="#8B6BB5">&gt;</tspan> <tspan fill="#A78BCA">load</tspan> TAILWIND__OK</text>
      <text x="92" y="432" fill="#6b4ba0">_ ready.</text>
