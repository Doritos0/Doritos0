<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="cx-title">
  <title id="cx-title">Codex: lo que practico - lo que persigo</title>
  <defs>
    <linearGradient id="cx-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06030d"/>
      <stop offset="100%" stop-color="#150a26"/>
    </linearGradient>
    <linearGradient id="cx-page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="50%" stop-color="#3d2050"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <radialGradient id="cx-page-light" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#8B6BB5" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B6BB5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cx-seal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8D5FF"/>
      <stop offset="40%" stop-color="#A78BCA"/>
      <stop offset="100%" stop-color="#4a2a6e"/>
    </radialGradient>
    <filter id="cx-glow">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#cx-bg)"/>

  <!-- Ambient stars / dust -->
  <g fill="#A78BCA" opacity="0.4">
    <circle cx="60" cy="40" r="0.6"/>
    <circle cx="140" cy="80" r="0.5"/>
    <circle cx="1100" cy="50" r="0.6"/>
    <circle cx="1040" cy="90" r="0.5"/>
    <circle cx="80" cy="380" r="0.5"/>
    <circle cx="1120" cy="370" r="0.6"/>
  </g>

  <!-- Codex - two pages -->
  <!-- Page shadows -->
  <path d="M 96 64 L 596 60 L 596 380 L 96 384 Z" fill="#04020a" opacity="0.55"/>
  <path d="M 604 60 L 1104 64 L 1104 384 L 604 380 Z" fill="#04020a" opacity="0.55"/>

  <!-- Left page -->
  <path d="M 100 60 L 596 56 L 596 376 L 100 380 Z" fill="url(#cx-page)" stroke="#8B6BB5" stroke-width="0.9"/>
  <path d="M 100 60 L 596 56 L 596 376 L 100 380 Z" fill="url(#cx-page-light)" opacity="0.5"/>

  <!-- Right page -->
  <path d="M 604 56 L 1100 60 L 1100 380 L 604 376 Z" fill="url(#cx-page)" stroke="#8B6BB5" stroke-width="0.9"/>
  <path d="M 604 56 L 1100 60 L 1100 380 L 604 376 Z" fill="url(#cx-page-light)" opacity="0.5"/>

  <!-- Central spine -->
  <line x1="600" y1="56" x2="600" y2="376" stroke="#04020a" stroke-width="2.5"/>
  <line x1="600" y1="56" x2="600" y2="376" stroke="#8B6BB5" stroke-width="0.4" opacity="0.6"/>

  <!-- Page inner borders -->
  <g fill="none" stroke="#A78BCA" stroke-width="0.5" opacity="0.7">
    <path d="M 122 84 L 578 80 L 578 358 L 122 360 Z"/>
    <path d="M 622 80 L 1078 84 L 1078 360 L 622 358 Z"/>
  </g>
  <g fill="none" stroke="#A78BCA" stroke-width="0.3" opacity="0.4">
    <path d="M 128 90 L 572 86 L 572 354 L 128 356 Z"/>
    <path d="M 628 86 L 1072 90 L 1072 356 L 628 354 Z"/>
  </g>

  <!-- Corner ornaments on both pages -->
  <g stroke="#C9A8D6" stroke-width="0.7" fill="none" opacity="0.85">
    <g transform="translate(122 84)">
      <path d="M 0 14 L 0 0 L 14 0"/>
      <path d="M 4 4 L 10 4 M 4 4 L 4 10"/>
      <circle cx="2" cy="2" r="1.2" fill="#C9A8D6"/>
    </g>
    <g transform="translate(578 80) scale(-1 1)">
      <path d="M 0 14 L 0 0 L 14 0"/>
      <path d="M 4 4 L 10 4 M 4 4 L 4 10"/>
      <circle cx="2" cy="2" r="1.2" fill="#C9A8D6"/>
    </g>
    <g transform="translate(122 358) scale(1 -1)">
      <path d="M 0 14 L 0 0 L 14 0"/>
      <path d="M 4 4 L 10 4 M 4 4 L 4 10"/>
      <circle cx="2" cy="2" r="1.2" fill="#C9A8D6"/>
    </g>
    <g transform="translate(578 358) scale(-1 -1)">
      <path d="M 0 14 L 0 0 L 14 0"/>
      <path d="M 4 4 L 10 4 M 4 4 L 4 10"/>
      <circle cx="2" cy="2" r="1.2" fill="#C9A8D6"/>
    </g>
    <g transform="translate(622 80)">
      <path d="M 0 14 L 0 0 L 14 0"/>
      <path d="M 4 4 L 10 4 M 4 4 L 4 10"/>
      <circle cx="2" cy="2" r="1.2" fill="#C9A8D6"/>
    </g>
    <g transform="translate(1078 84) scale(-1 1)">
      <path d="M 0 14 L 0 0 L 14 0"/>
      <path d="M 4 4 L 10 4 M 4 4 L 4 10"/>
      <circle cx="2" cy="2" r="1.2" fill="#C9A8D6"/>
    </g>
    <g transform="translate(622 358) scale(1 -1)">
      <path d="M 0 14 L 0 0 L 14 0"/>
      <path d="M 4 4 L 10 4 M 4 4 L 4 10"/>
      <circle cx="2" cy="2" r="1.2" fill="#C9A8D6"/>
    </g>
    <g transform="translate(1078 358) scale(-1 -1)">
      <path d="M 0 14 L 0 0 L 14 0"/>
      <path d="M 4 4 L 10 4 M 4 4 L 4 10"/>
      <circle cx="2" cy="2" r="1.2" fill="#C9A8D6"/>
    </g>
  </g>

  <!-- LEFT PAGE HEADING -->
  <g>
    <text x="350" y="118" text-anchor="middle"
          font-family="Georgia, serif" font-size="11"
          fill="#A78BCA" letter-spacing="7" opacity="0.85">
      ━ &#x2720; ━━ I &#x00B7; HEMISFERIO IZQUIERDO ━━ &#x2720; ━
    </text>
    <text x="350" y="156" text-anchor="middle"
          font-family="Georgia, serif" font-size="26" font-weight="700"
          fill="#E8D5FF" letter-spacing="11" filter="url(#cx-glow)">
      LO QUE PRACTICO
    </text>
    <line x1="200" y1="170" x2="500" y2="170" stroke="#8B6BB5" stroke-width="0.5" opacity="0.7"/>
    <path d="M 350 167 l 4 -4 l 4 4 l -4 4 z" fill="#C9A8D6"/>
  </g>

  <!-- LEFT PAGE LINES -->
  <g font-family="Georgia, serif" font-size="14" fill="#D8C5F0" opacity="0.95">
    <text x="160" y="210">
      <tspan fill="#C9A8D6" font-weight="700">&#x2720;</tspan>
      <tspan dx="14">arquitectura limpia, capas claras</tspan>
    </text>
    <text x="160" y="240">
      <tspan fill="#C9A8D6" font-weight="700">&#x2720;</tspan>
      <tspan dx="14">APIs que documentan su propia historia</tspan>
    </text>
    <text x="160" y="270">
      <tspan fill="#C9A8D6" font-weight="700">&#x2720;</tspan>
      <tspan dx="14">UI silenciosa, accesible, respirable</tspan>
    </text>
    <text x="160" y="300">
      <tspan fill="#C9A8D6" font-weight="700">&#x2720;</tspan>
      <tspan dx="14">tipado estricto, pruebas escritas a mano</tspan>
    </text>
    <text x="160" y="330">
      <tspan fill="#C9A8D6" font-weight="700">&#x2720;</tspan>
      <tspan dx="14">commits que se leen como un salterio</tspan>
    </text>
  </g>

  <!-- RIGHT PAGE HEADING -->
  <g>
    <text x="850" y="118" text-anchor="middle"
          font-family="Georgia, serif" font-size="11"
          fill="#A78BCA" letter-spacing="7" opacity="0.85">
      ━ &#x2628; ━━ II &#x00B7; HEMISFERIO DERECHO ━━ &#x2628; ━
    </text>
    <text x="850" y="156" text-anchor="middle"
          font-family="Georgia, serif" font-size="26" font-weight="700"
          fill="#E8D5FF" letter-spacing="11" filter="url(#cx-glow)">
      LO QUE PERSIGO
    </text>
    <line x1="700" y1="170" x2="1000" y2="170" stroke="#8B6BB5" stroke-width="0.5" opacity="0.7"/>
    <path d="M 850 167 l 4 -4 l 4 4 l -4 4 z" fill="#C9A8D6"/>
  </g>

  <!-- RIGHT PAGE LINES -->
  <g font-family="Georgia, serif" font-size="14" fill="#D8C5F0" opacity="0.95">
    <text x="660" y="210">
      <tspan fill="#C9A8D6" font-weight="700">&#x2628;</tspan>
      <tspan dx="14">sistemas que envejecen con dignidad</tspan>
    </text>
    <text x="660" y="240">
      <tspan fill="#C9A8D6" font-weight="700">&#x2628;</tspan>
      <tspan dx="14">b&#xF3;vedas relacionales bien forjadas</tspan>
    </text>
    <text x="660" y="270">
      <tspan fill="#C9A8D6" font-weight="700">&#x2628;</tspan>
      <tspan dx="14">latencia baja, sem&#xE1;ntica alta</tspan>
    </text>
    <text x="660" y="300">
      <tspan fill="#C9A8D6" font-weight="700">&#x2628;</tspan>
      <tspan dx="14">observabilidad como tercer ojo</tspan>
    </text>
    <text x="660" y="330">
      <tspan fill="#C9A8D6" font-weight="700">&#x2628;</tspan>
      <tspan dx="14">c&#xF3;digo que un extra&#xF1;o pueda leer</tspan>
    </text>
  </g>

  <!-- Wax seal on the spine -->
  <g transform="translate(600 200)">
    <circle r="26" fill="#04020a" opacity="0.5"/>
    <circle r="22" fill="url(#cx-seal)"/>
    <circle r="22" fill="none" stroke="#04020a" stroke-width="0.6"/>
    <circle r="17" fill="none" stroke="#04020a" stroke-width="0.4" opacity="0.7"/>
    <!-- Sigil inside seal: D0 monogram-like cross -->
    <path d="M -8 -6 L -8 8 L -4 8 Q 2 8 2 1 Q 2 -6 -4 -6 Z" fill="#04020a" opacity="0.85"/>
    <circle cx="7" cy="1" r="5" fill="none" stroke="#04020a" stroke-width="1.4" opacity="0.85"/>
  </g>
  <!-- Wax drip -->
  <path d="M 595 224 q 0 8 5 14 q 5 -6 5 -14 Z" fill="#6b4ba0"/>

  <!-- Ribbon at bottom -->
  <g>
    <path d="M 540 376 L 540 396 L 560 388 L 580 396 L 580 376 Z" fill="#4a2a6e" stroke="#8B6BB5" stroke-width="0.5"/>
    <path d="M 620 376 L 620 396 L 640 388 L 660 396 L 660 376 Z" fill="#4a2a6e" stroke="#8B6BB5" stroke-width="0.5"/>
  </g>

  <!-- Floating dust around the codex -->
  <g fill="#D8C5F0">
    <circle cx="60" cy="200" r="0.8" opacity="0.6"/>
    <circle cx="40" cy="260" r="0.5" opacity="0.5"/>
    <circle cx="80" cy="310" r="0.6" opacity="0.55"/>
    <circle cx="1140" cy="210" r="0.8" opacity="0.6"/>
    <circle cx="1160" cy="270" r="0.5" opacity="0.5"/>
    <circle cx="1120" cy="320" r="0.6" opacity="0.55"/>
  </g>
</svg>
