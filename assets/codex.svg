<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="cx-title">
  <title id="cx-title">Codex - dos placas industriales brutalistas</title>
  <defs>
    <linearGradient id="cx-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06030d"/>
      <stop offset="100%" stop-color="#150a26"/>
    </linearGradient>
    <linearGradient id="cx-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="55%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0510"/>
    </linearGradient>
    <linearGradient id="cx-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a2a6e"/>
      <stop offset="100%" stop-color="#2d1b4e"/>
    </linearGradient>
    <linearGradient id="cx-title-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4e7ff"/>
      <stop offset="100%" stop-color="#A78BCA"/>
    </linearGradient>
    <filter id="cx-glow"><feGaussianBlur stdDeviation="1.4"/></filter>
    <pattern id="cx-noise" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#06030d"/>
      <rect x="0" y="0" width="1" height="1" fill="#1a0a2e" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" fill="url(#cx-bg)"/>
  <!-- Background noise texture -->
  <rect width="1200" height="420" fill="url(#cx-noise)" opacity="0.35"/>

  <!-- Crosshair grid faint -->
  <g stroke="#2d1b4e" stroke-width="0.3" opacity="0.4">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="370" x2="1200" y2="370"/>
    <line x1="50" y1="0" x2="50" y2="420"/>
    <line x1="1150" y1="0" x2="1150" y2="420"/>
  </g>
  <g stroke="#5d3a8a" stroke-width="0.7" opacity="0.6">
    <line x1="0" y1="50" x2="40" y2="50"/>
    <line x1="50" y1="0" x2="50" y2="40"/>
    <line x1="1160" y1="50" x2="1200" y2="50"/>
    <line x1="1150" y1="0" x2="1150" y2="40"/>
    <line x1="0" y1="370" x2="40" y2="370"/>
    <line x1="50" y1="380" x2="50" y2="420"/>
    <line x1="1160" y1="370" x2="1200" y2="370"/>
    <line x1="1150" y1="380" x2="1150" y2="420"/>
  </g>

  <!-- Doc index at top -->
  <text x="60" y="36" font-family="Consolas, 'Courier New', monospace" font-size="10" letter-spacing="3" fill="#8B6BB5">DOC // CDX-0080-I &#x00B7; CLASSIF: OPERATOR &#x00B7; REV.05</text>
  <text x="1140" y="36" text-anchor="end" font-family="Consolas, 'Courier New', monospace" font-size="10" letter-spacing="3" fill="#8B6BB5">[ &#x25A0; &#x25A0; &#x25A1; &#x25A1; &#x25A1; ]</text>

  <!-- ============ LEFT PANEL ============ -->
  <g>
    <!-- Panel shadow -->
    <rect x="84" y="74" width="488" height="280" fill="#04020a" opacity="0.7"/>
    <!-- Panel body -->
    <rect x="80" y="70" width="488" height="280" fill="url(#cx-panel)" stroke="#8B6BB5" stroke-width="1"/>
    <!-- Inner border -->
    <rect x="88" y="78" width="472" height="264" fill="none" stroke="#5d3a8a" stroke-width="0.4" opacity="0.7"/>

    <!-- Corner bolts -->
    <g fill="#06030d" stroke="#8B6BB5" stroke-width="0.6">
      <circle cx="94" cy="84" r="3"/>
      <circle cx="554" cy="84" r="3"/>
      <circle cx="94" cy="336" r="3"/>
      <circle cx="554" cy="336" r="3"/>
    </g>
    <g stroke="#8B6BB5" stroke-width="0.5" opacity="0.85">
      <line x1="92" y1="84" x2="96" y2="84"/><line x1="94" y1="82" x2="94" y2="86"/>
      <line x1="552" y1="84" x2="556" y2="84"/><line x1="554" y1="82" x2="554" y2="86"/>
      <line x1="92" y1="336" x2="96" y2="336"/><line x1="94" y1="334" x2="94" y2="338"/>
      <line x1="552" y1="336" x2="556" y2="336"/><line x1="554" y1="334" x2="554" y2="338"/>
    </g>

    <!-- Top hazard band -->
    <rect x="100" y="92" width="448" height="22" fill="url(#cx-band)"/>
    <g fill="#06030d">
      <rect x="100" y="92" width="14" height="22"/>
      <rect x="534" y="92" width="14" height="22"/>
    </g>
    <text x="324" y="108" text-anchor="middle"
          font-family="Consolas, 'Courier New', monospace"
          font-size="11" letter-spacing="6" fill="#D8C5F0">
      &#x25B6; SECTION I &#x00B7; OPERATIONAL DOCTRINE &#x25C0;
    </text>

    <!-- Title -->
    <text x="324" y="160" text-anchor="middle"
          font-family="Impact, 'Arial Black', Haettenschweiler, sans-serif"
          font-size="32" font-weight="900" letter-spacing="6"
          fill="url(#cx-title-g)" filter="url(#cx-glow)">
      LO QUE PRACTICO
    </text>
    <line x1="180" y1="172" x2="468" y2="172" stroke="#8B6BB5" stroke-width="0.6"/>
    <line x1="200" y1="176" x2="448" y2="176" stroke="#5d3a8a" stroke-width="0.3"/>

    <!-- Items -->
    <g font-family="'Arial Black', Impact, sans-serif" font-size="13" font-weight="700" fill="#D8C5F0" letter-spacing="2">
      <text x="120" y="208">
        <tspan font-family="Consolas, monospace" fill="#A78BCA">01 //</tspan>
        <tspan dx="10">ARQUITECTURA LIMPIA, CAPAS CLARAS</tspan>
      </text>
      <text x="120" y="234">
        <tspan font-family="Consolas, monospace" fill="#A78BCA">02 //</tspan>
        <tspan dx="10">APIS QUE DOCUMENTAN SU PROPIA HISTORIA</tspan>
      </text>
      <text x="120" y="260">
        <tspan font-family="Consolas, monospace" fill="#A78BCA">03 //</tspan>
        <tspan dx="10">UI SILENCIOSA, ACCESIBLE, RESPIRABLE</tspan>
      </text>
      <text x="120" y="286">
        <tspan font-family="Consolas, monospace" fill="#A78BCA">04 //</tspan>
        <tspan dx="10">TIPADO ESTRICTO, PRUEBAS A MANO</tspan>
      </text>
      <text x="120" y="312">
        <tspan font-family="Consolas, monospace" fill="#A78BCA">05 //</tspan>
        <tspan dx="10">COMMITS QUE NARRAN EL SISTEMA</tspan>
      </text>
    </g>
  </g>

  <!-- Divider rivet line between panels -->
  <line x1="600" y1="70" x2="600" y2="350" stroke="#3d2050" stroke-width="0.6" stroke-dasharray="2 6" opacity="0.8"/>

  <!-- ============ RIGHT PANEL ============ -->
  <g>
    <rect x="636" y="74" width="488" height="280" fill="#04020a" opacity="0.7"/>
    <rect x="632" y="70" width="488" height="280" fill="url(#cx-panel)" stroke="#8B6BB5" stroke-width="1"/>
    <rect x="640" y="78" width="472" height="264" fill="none" stroke="#5d3a8a" stroke-width="0.4" opacity="0.7"/>

    <g fill="#06030d" stroke="#8B6BB5" stroke-width="0.6">
      <circle cx="646" cy="84" r="3"/>
      <circle cx="1106" cy="84" r="3"/>
      <circle cx="646" cy="336" r="3"/>
      <circle cx="1106" cy="336" r="3"/>
    </g>
    <g stroke="#8B6BB5" stroke-width="0.5" opacity="0.85">
      <line x1="644" y1="84" x2="648" y2="84"/><line x1="646" y1="82" x2="646" y2="86"/>
      <line x1="1104" y1="84" x2="1108" y2="84"/><line x1="1106" y1="82" x2="1106" y2="86"/>
      <line x1="644" y1="336" x2="648" y2="336"/><line x1="646" y1="334" x2="646" y2="338"/>
      <line x1="1104" y1="336" x2="1108" y2="336"/><line x1="1106" y1="334" x2="1106" y2="338"/>
    </g>

    <rect x="652" y="92" width="448" height="22" fill="url(#cx-band)"/>
    <g fill="#06030d">
      <rect x="652" y="92" width="14" height="22"/>
      <rect x="1086" y="92" width="14" height="22"/>
    </g>
    <text x="876" y="108" text-anchor="middle"
          font-family="Consolas, 'Courier New', monospace"
          font-size="11" letter-spacing="6" fill="#D8C5F0">
      &#x25B6; SECTION II &#x00B7; OPERATIONAL TARGETS &#x25C0;
    </text>

    <text x="876" y="160" text-anchor="middle"
          font-family="Impact, 'Arial Black', Haettenschweiler, sans-serif"
          font-size="32" font-weight="900" letter-spacing="6"
          fill="url(#cx-title-g)" filter="url(#cx-glow)">
      LO QUE PERSIGO
    </text>
    <line x1="732" y1="172" x2="1020" y2="172" stroke="#8B6BB5" stroke-width="0.6"/>
    <line x1="752" y1="176" x2="1000" y2="176" stroke="#5d3a8a" stroke-width="0.3"/>

    <g font-family="'Arial Black', Impact, sans-serif" font-size="13" font-weight="700" fill="#D8C5F0" letter-spacing="2">
      <text x="672" y="208">
        <tspan font-family="Consolas, monospace" fill="#A78BCA">01 //</tspan>
        <tspan dx="10">SISTEMAS QUE ENVEJECEN CON DIGNIDAD</tspan>
      </text>
      <text x="672" y="234">
        <tspan font-family="Consolas, monospace" fill="#A78BCA">02 //</tspan>
        <tspan dx="10">BOVEDAS RELACIONALES BIEN FORJADAS</tspan>
      </text>
      <text x="672" y="260">
        <tspan font-family="Consolas, monospace" fill="#A78BCA">03 //</tspan>
        <tspan dx="10">LATENCIA BAJA, SEMANTICA ALTA</tspan>
      </text>
      <text x="672" y="286">
        <tspan font-family="Consolas, monospace" fill="#A78BCA">04 //</tspan>
        <tspan dx="10">OBSERVABILIDAD COMO TERCER OJO</tspan>
      </text>
      <text x="672" y="312">
        <tspan font-family="Consolas, monospace" fill="#A78BCA">05 //</tspan>
        <tspan dx="10">CODIGO QUE UN EXTRANO PUEDA LEER</tspan>
      </text>
    </g>
  </g>

  <!-- Footer hazard strip -->
  <g>
    <rect x="80" y="378" width="1040" height="14" fill="#0a0510" stroke="#3d2050" stroke-width="0.5"/>
    <g fill="#3d2050">
      <rect x="80" y="378" width="14" height="14"/>
      <rect x="120" y="378" width="14" height="14"/>
      <rect x="160" y="378" width="14" height="14"/>
      <rect x="200" y="378" width="14" height="14"/>
      <rect x="1106" y="378" width="14" height="14"/>
      <rect x="1066" y="378" width="14" height="14"/>
      <rect x="1026" y="378" width="14" height="14"/>
      <rect x="986" y="378" width="14" height="14"/>
    </g>
    <text x="600" y="389" text-anchor="middle"
          font-family="Consolas, 'Courier New', monospace"
          font-size="9" letter-spacing="5" fill="#A78BCA">
      / / END.OF.MANIFEST / / RETURN TO TERMINAL / /
    </text>
  </g>
</svg>
